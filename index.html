<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Mor2</title>
    <script src="libs/papaparse.min.js"></script>
    <script src="libs/plotly.min.js"></script>
    <script src="lda.js"></script>
    <script src="main.js"></script>
    <style>
        body { font-family: sans-serif; margin: 20px; background: #f4f4f9; color: #333; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex-grow: 1; padding: 12px; border: 1px solid #ccc; border-radius: 6px; }
        button { padding: 10px 25px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 6px; font-weight: bold; }
        #result { font-weight: bold; margin-bottom: 15px; padding: 10px; border-radius: 6px; background: #e9ecef; min-height: 20px; }
        #graph { height: 600px; border: 1px solid #eee; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🧬 Mor2</h2>
    <div id="result">Загрузка данных...</div>

    <div class="controls">
        <input type="text" id="userData" placeholder="Вставьте Eurogenes G25 (напр. AB123456_scaled,0.125,0.083...)">
        <button onclick="addUserSample()">Анализировать</button>
    </div>

    <div id="graph"></div>
</div>
</body>
</html>
